<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" role="img" aria-label="Before and after comparison">
  <rect width="1200" height="420" fill="#f8fafc"/>
  <rect x="60" y="70" width="500" height="280" rx="12" fill="#fee2e2" stroke="#fca5a5"/>
  <rect x="640" y="70" width="500" height="280" rx="12" fill="#dcfce7" stroke="#86efac"/>
  <text x="310" y="120" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="32" fill="#7f1d1d" font-weight="700">Before</text>
  <text x="890" y="120" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="32" fill="#14532d" font-weight="700">After</text>
  <g font-family="Segoe UI, Arial, sans-serif" font-size="24">
    <text x="100" y="175" fill="#7f1d1d">• 300+ lines of boilerplate</text>
    <text x="100" y="215" fill="#7f1d1d">• Manual auth + tool wiring</text>
    <text x="100" y="255" fill="#7f1d1d">• No readiness scoring</text>
    <text x="100" y="295" fill="#7f1d1d">• Setup in hours</text>
    <text x="680" y="175" fill="#14532d">• Scaffold generated automatically</text>
    <text x="680" y="215" fill="#14532d">• Auth + validation included</text>
    <text x="680" y="255" fill="#14532d">• Grade A readiness checks</text>
    <text x="680" y="295" fill="#14532d">• Setup in minutes</text>
  </g>
</svg>
